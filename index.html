<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMind AI</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
   <header>
    <div class="header">
    <button id="themeBtn">☀️ Light Mode</button>

    <h1>🎬 CineMind AI</h1>
    <p>Discover Movies, Ratings and AI Recommendations</p>
</div>
    <!-- <p class="tagline">
        Discover Movies, Ratings and AI Recommendations
    </p> -->
</header>
<br>
    <div class="search-container">
        <input
    type="text"
    id="movieInput"
    placeholder="Search for a movie..."
>
<button onclick="searchMovie()">
    Search
</button>
    </div>
    <div id="movieContainer"></div>
      <h2>🔥 Trending Movies</h2>
<div id="trendingMovies"></div> 
<br> 
<h2 id="recommendationTitle" style="display:none;">
    🤖 AI Recommendations
</h2>
<div id="recommendation"></div>  
<div class="favorites-header">

    <h2>⭐ Favorite Movies</h2>

    <button class="clear-btn"
            onclick="clearFavorites()">
        🗑 Clear Favorites
    </button>

</div>

<div id="favoritesContainer"></div>
    <script src="script.js"></script>
</body>
</html>
